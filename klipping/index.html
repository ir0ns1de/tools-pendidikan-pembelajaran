<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kliping Artikel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background:#f7f7f5;
    font-family: system-ui, -apple-system, sans-serif;
}

.item {
    background:white;
    border-radius:10px;
    padding:10px 14px;
    margin-bottom:8px;
    box-shadow:0 1px 2px rgba(0,0,0,.06);
}

.title {
    font-size:14px;
    font-weight:600;
    color:#0645ad;
    cursor:pointer;
}

.title:hover {
    text-decoration:underline;
}
</style>
</head>

<body class="p-4">

<div class="container">

    <div class="mb-4">
        <h4 class="mb-1">📚 Klipping Artikel</h4>
        <small class="text-muted">Presented by Bikinkarya Creative Labs</small>
    </div>

    <!-- SEARCH -->
    <input type="text" id="search"
           class="form-control mb-3"
           placeholder="Cari judul…">

    <!-- LIST -->
    <div id="list"></div>

</div>

<!-- MODAL DETAIL -->
<div class="modal fade" id="detailModal" tabindex="-1">
<div class="modal-dialog modal-xl modal-dialog-scrollable">
<div class="modal-content">

<div class="modal-header">
    <h5 class="modal-title" id="modalTitle"></h5>
    <button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
    <div class="text-muted small mb-3" id="modalMeta"></div>
    <div id="modalContent"></div>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ================= CONFIG ================= */
const API_GET = "https://assets.expo.my.id/klipping/api/clipper-get.php";

/* ================= LOAD LIST ================= */
async function loadList(q = "") {
    const res = await fetch(`${API_GET}?q=${encodeURIComponent(q)}`);
    const json = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    if (!json.data || json.data.length === 0) {
        list.innerHTML = `<div class="text-muted">Tidak ada data</div>`;
        return;
    }

    json.data.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div class="title" onclick="loadDetail(${item.id})">
                ${item.title}
            </div>
            <div class="text-muted small">${item.created_at}</div>
        `;
        list.appendChild(div);
    });
}

/* ================= LOAD DETAIL ================= */
async function loadDetail(id) {
    const res = await fetch(`${API_GET}?id=${id}`);
    const json = await res.json();
    const d = json.data;

    document.getElementById("modalTitle").innerText = d.title;
    document.getElementById("modalMeta").innerHTML =
        d.created_at + ' · <a href="'+d.source_url+'" target="_blank">sumber</a>';

    document.getElementById("modalContent").innerHTML = d.content;

    new bootstrap.Modal(
        document.getElementById("detailModal")
    ).show();
}

/* ================= SEARCH ================= */
document.getElementById("search").addEventListener("input", e => {
    loadList(e.target.value);
});

/* INIT */
loadList();
</script>

</body>
</html>
