<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kliping Artikel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f7f5;
            --paper: #ffffff;
            --line: #e7e5e4;
            --line-strong: #d6d3d1;
            --text: #2f3437;
            --muted: #787774;
            --accent: #2383e2;
            --shadow: 0 1px 2px rgba(15, 23, 42, .04), 0 10px 24px rgba(15, 23, 42, .04);
        }

        body {
            margin: 0;
            background:
                radial-gradient(circle at 0% -10%, #ecebe9 0%, transparent 45%),
                radial-gradient(circle at 100% 0%, #efeeec 0%, transparent 35%),
                var(--bg);
            color: var(--text);
            font-family: "Segoe UI", "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        }

        .app-shell {
            width: min(960px, 100%);
            margin: 0 auto;
            padding: 28px 16px 40px;
        }

        .surface {
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .topbar {
            margin-bottom: 18px;
        }

        .topbar h4 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -.02em;
        }

        .topbar small {
            color: var(--muted);
            font-size: .88rem;
        }

        .search-wrap {
            margin-bottom: 14px;
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid var(--line);
            padding: .7rem .85rem;
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(35, 131, 226, .15);
        }

        .item {
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform .2s ease, border-color .2s ease;
        }

        .item:hover {
            transform: translateY(-1px);
            border-color: var(--line-strong);
        }

        .title {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -.01em;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .meta {
            color: var(--muted);
            font-size: .82rem;
        }

        .empty {
            padding: 28px 16px;
            color: var(--muted);
            text-align: center;
        }

        @media (max-width: 768px) {
            .app-shell {
                padding-top: 20px;
            }

            .topbar h4 {
                font-size: 1.28rem;
            }
        }
    </style>
</head>

<body>
    <main class="app-shell">
        <header class="topbar">
            <h4>📖 Kliping Artikel</h4>
            <small>Archive Knowledge Management - Presented by Bikinkarya Creative Labs</small>
        </header>

        <div class="search-wrap">
            <input type="text" id="search" class="form-control" placeholder="Cari judul...">
        </div>

        <div id="list"></div>

    </main>

    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle"></h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div class="text-muted small mb-3" id="modalMeta"></div>
                    <div id="modalContent"></div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_GET = "https://assets.expo.my.id/klipping/api/clipper-get.php";

        async function loadList(q = "") {
            const res = await fetch(`${API_GET}?q=${encodeURIComponent(q)}`);
            const json = await res.json();

            const list = document.getElementById("list");
            list.innerHTML = "";

            if (!json.data || json.data.length === 0) {
                list.innerHTML = `<div class="surface empty">Tidak ada data</div>`;
                return;
            }

            json.data.forEach(item => {
                const div = document.createElement("article");
                div.className = "surface item";
                div.onclick = () => loadDetail(item.id);

                div.innerHTML = `
            <div class="title">${item.title}</div>
            <div class="meta">${item.created_at}</div>
        `;

                list.appendChild(div);
            });
        }

        async function loadDetail(id) {
            const res = await fetch(`${API_GET}?id=${id}`);
            const json = await res.json();
            const d = json.data;

            document.getElementById("modalTitle").innerText = d.title;
            document.getElementById("modalMeta").innerHTML =
                d.created_at + ' · <a href="' + d.source_url + '" target="_blank">sumber</a>';

            document.getElementById("modalContent").innerHTML = d.content;

            new bootstrap.Modal(
                document.getElementById("detailModal")
            ).show();
        }

        document.getElementById("search").addEventListener("input", e => {
            loadList(e.target.value);
        });

        loadList();
    </script>

</body>

</html>
