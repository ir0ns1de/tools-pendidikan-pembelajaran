<style>
  html,
  body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #020617;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }

  /* Launcher */
  #launcher {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 25px;
    text-align: center;
    color: #e2e8f0;
    background: radial-gradient(circle at top, #0f172a, #020617);
    z-index: 2;
  }

  #launcher h1 {
    font-size: 1.8rem;
    font-weight: 600;
    letter-spacing: 0.4px;
    max-width: 650px;
  }

  #startBtn {
    padding: 14px 34px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: linear-gradient(135deg, #22c55e, #4ade80);
    color: #020617;
    font-weight: 700;
    letter-spacing: .5px;
    transition: transform .15s ease, box-shadow .15s ease;
  }

  #startBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 35px rgba(34, 197, 94, 0.5);
  }

  /* iframe */
  iframe {
    display: none;
    width: 100%;
    height: 100%;
    border: none;
    background: #020617;
  }
</style>
</head>

<body>

  <style>
    #floatingStat {
      position: fixed;
      bottom: 24px;
      left: 80%;
      transform: translateX(-50%);
      background: #0f172a;
      padding: 10px 18px;
      border-radius: 30px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, .45);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: bold;
      color: #22c55e;
      z-index: 9999;
    }

    #eyeIcon {
      font-size: 20px;
    }

    #floatingStat span.tooltip {
      position: absolute;
      bottom: 58px;
      left: 50%;
      transform: translateX(-50%);
      background: #020617;
      color: #22c55e;
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 13px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    #floatingStat:hover span.tooltip {
      opacity: 1;
    }
  </style>

  <div id="floatingStat">
    <span id="eyeIcon">👁</span>
    <span id="countText">...</span>
    <span class="tooltip">Total Hacker Masuk</span>
  </div>

  <script>
    (function () {

      const API = "https://script.google.com/macros/s/AKfycbxiGi8CsUmp1xhdzB2uzxRd3SLa5Yhd3RtBRYEDxmj7dwa5th80-vOiCJyJeW1SFzJU/exec";
      const SHEET = "pameran-transisi";

      const STORAGE_KEY = "visitor_logged";
      const EXPIRE_MINUTES = 5;

      const now = Date.now();
      const lastVisit = localStorage.getItem(STORAGE_KEY);

      function updateCount(total) {
        document.getElementById("countText").innerText = total;
      }

      function getOnly() {
        fetch(`${API}?mode=get&sheet=${SHEET}`)
          .then(res => res.json())
          .then(data => updateCount(data.total_pengunjung))
          .catch(() => updateCount("!"));
      }

      function countVisitor() {

        fetch("https://ipapi.co/json/")
          .then(res => res.json())
          .then(loc => {

            return fetch(
              `${API}?mode=count&sheet=${SHEET}` +
              `&ip=${encodeURIComponent(loc.ip)}` +
              `&country=${encodeURIComponent(loc.country_name)}` +
              `&ua=${encodeURIComponent(navigator.userAgent)}`
            );

          })
          .then(res => res.json())
          .then(data => {

            updateCount(data.total_pengunjung);
            localStorage.setItem(STORAGE_KEY, now);

          })
          .catch(() => getOnly());

      }

      if (!lastVisit || (now - lastVisit) > EXPIRE_MINUTES * 60 * 1000) {
        countVisitor();
      } else {
        getOnly();
      }

    })();
  </script>


  <!-- Launcher -->
  <div id="launcher">

    <h1>
      “Belajar melalui Quiz Terstruktur”
    </h1>
    <h3>
      — Research by PTIK UNJ
    </h3>

    <button id="startBtn">Start Assesment as Learning</button>

  </div>


  <!-- App -->
  <iframe id="appFrame" src="" allow="autoplay; clipboard-write">
  </iframe>


  <script>

    const startBtn = document.getElementById("startBtn");
    const launcher = document.getElementById("launcher");
    const iframe = document.getElementById("appFrame");

    startBtn.addEventListener("click", () => {

      iframe.src = "https://ctf-learning.lovable.app";

      launcher.style.display = "none";
      iframe.style.display = "block";

    });

  </script>

</body>

</html>
